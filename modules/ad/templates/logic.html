<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>KURO::PAY Ad — Logic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: #000; }
  body {
    font-family: 'JetBrains Mono', monospace;
    color: #f5f3ff;
    position: relative;
  }
  .frame {
    width: 1080px; height: 1080px;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, rgba(50, 30, 80, 0.55) 0%, transparent 60%),
      radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.22) 0%, transparent 40%),
      linear-gradient(180deg, #05030d 0%, #000 100%);
    position: relative;
    overflow: hidden;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .frame::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(168,85,247,0.025) 2px, rgba(168,85,247,0.025) 3px);
    pointer-events: none;
  }
  .corner {
    position: absolute;
    width: 32px; height: 32px;
    border: 1px solid rgba(168,85,247,0.7);
  }
  .tl { top: 32px; left: 32px; border-right: none; border-bottom: none; }
  .tr { top: 32px; right: 32px; border-left: none; border-bottom: none; }
  .bl { bottom: 32px; left: 32px; border-right: none; border-top: none; }
  .br { bottom: 32px; right: 32px; border-left: none; border-top: none; }

  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #8a85a8;
    text-transform: uppercase;
    z-index: 2;
    position: relative;
  }
  .brand {
    color: #f5f3ff;
    font-weight: 500;
    font-size: 14px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .section-tag {
    color: #a855f7;
    font-weight: 600;
  }

  /* The big comparison */
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    z-index: 2;
    position: relative;
    align-items: end;
  }
  .side {
    padding: 40px 36px;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .side.them {
    border: 1px solid rgba(138, 133, 168, 0.35);
    background: rgba(10, 8, 24, 0.6);
  }
  .side.us {
    border: 1px solid #a855f7;
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(10, 8, 24, 0.7) 100%);
    box-shadow: 0 0 50px rgba(168, 85, 247, 0.25);
    margin-left: -1px;
  }
  .side .label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .side.them .label { color: #8a85a8; }
  .side.us .label { color: #c084fc; }
  .side .pct {
    font-family: 'Unbounded', sans-serif;
    font-size: 140px;
    font-weight: 900;
    line-height: 0.85;
    letter-spacing: -0.06em;
    margin: 20px 0 16px;
  }
  .side.them .pct {
    color: #6b6880;
    text-decoration: line-through;
    text-decoration-color: #c74b4b;
    text-decoration-thickness: 5px;
  }
  .side.us .pct {
    background: linear-gradient(180deg, #ffffff 0%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .side .who {
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #f5f3ff;
    font-weight: 500;
  }
  .side.them .who { color: #8a85a8; }

  /* Hero line */
  .hero {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1.0;
    letter-spacing: -0.045em;
    color: #ffffff;
    z-index: 2;
    position: relative;
    margin-bottom: 10px;
  }
  .hero .hl {
    color: #c084fc;
  }

  /* Footer */
  .ftr {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 2;
    position: relative;
  }
  .cta {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cta .url {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #f5f3ff;
    letter-spacing: -0.02em;
    text-decoration: none;
  }
  .cta .url .slash { color: #a855f7; }
  .cta .plat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #8a85a8;
    text-transform: uppercase;
  }
  .cta .plat .dot { color: #a855f7; margin: 0 8px; }
  .variant-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: #4a4560;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.8;
  }
  .variant-tag .num { color: #a855f7; }
</style>
</head>
<body>
<div class="frame">
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <div class="hdr">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="15" stroke="#a855f7" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="4" fill="#a855f7"/>
        <path d="M16 1 L16 9 M16 23 L16 31 M1 16 L9 16 M23 16 L31 16" stroke="#a855f7" stroke-width="1.5"/>
      </svg>
      KURO::PAY
    </div>
    <div class="section-tag">// Math</div>
  </div>

  <div>
    <h1 class="hero">
      The 3% isn't friction.<br/>
      <span class="hl">It's margin.</span>
    </h1>

    <div class="compare">
      <div class="side them">
        <div class="label">Visa · Mastercard · Amex</div>
        <div class="pct">3%</div>
        <div class="who">what they take from your merchant</div>
      </div>
      <div class="side us">
        <div class="label">KURO::PAY</div>
        <div class="pct">0.5%</div>
        <div class="who">what we take, tier-scaled</div>
      </div>
    </div>
  </div>

  <div class="ftr">
    <div class="cta">
      <a class="url" href="https://kuroglass.net/pay">kuroglass.net<span class="slash">/</span>pay</a>
      <div class="plat">WEB <span class="dot">·</span> iOS COMING SOON</div>
    </div>
    <div class="variant-tag">
      VARIANT · <span class="num">LOGIC</span><br/>
      KURO::PAY · 2026
    </div>
  </div>
</div>
</body>
</html>
